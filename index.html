<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Simon</title>
  <link rel="stylesheet" href="styles.css">  
  <link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">
</head>

<body>
  <h1 id="level-title"></h1>
  <div class="container">
    <div type="button" id="easy" class="difficulty easy">
      <h2 class="sf">Easy Mode</h2></div>
    <div type="button" id="hard" class="difficulty hard">
      <h2 class="sf">Hard Mode</h2></div>
  <div class="container">
      <div type="button" id="Do" class="btn Do">
        <h2 class="sf">Do</h2></div>

      <div type="button" id="Re" class="btn Re">
        <h2 class="sf">Re</h2></div>

      <div type="button" id="Mi" class="btn Mi">
        <h2 class="sf">Mi</h2></div>

      <div type="button" id="Fa" class="btn Fa">
        <h2 class="sf">Fa</h2></div>

      <div type="button" id="So" class="btn So">
        <h2 class="sf">So</h2></div>

      <div type="button" id="La" class="btn La">
        <h2 class="sf">La</h2></div>

      <div type="button" id="Ti" class="btn Ti">
        <h2 class="sf">Ti</h2></div>

      <div type="button" id="highDo" class="btn highDo">
        <h2 class="sf">Do</h2></div>
      </div>
      <h1 id="high-score">High Score!<p>500</p></h1>
      <h1 id="restart">Press a key to restart</h1>


      <script type="text/javascript" src="http://code.jquery.com/jquery-1.7.1.min.js"></script>


<script src="index.js"></script>
</body>

</html>
